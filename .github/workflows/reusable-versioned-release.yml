name: Reusable Versioned Release

on:
  workflow_call:
    inputs:
      edition:
        description: "Release edition"
        required: true
        type: string
      source_branch:
        description: "Branch whose version is released"
        required: true
        type: string
      tag_prefix:
        description: "Edition-specific release tag prefix"
        required: true
        type: string
      asset_prefix:
        description: "Edition-specific release asset prefix"
        required: true
        type: string
      image_repository:
        description: "Edition-specific container repository name"
        required: true
        type: string
      version_type:
        description: "Version bump type"
        required: true
        type: string
    outputs:
      new_version:
        description: "Bare package version"
        value: ${{ jobs.prepare.outputs.new_version }}
      new_tag:
        description: "Release tag"
        value: ${{ jobs.prepare.outputs.new_tag }}
      revision_sha:
        description: "Release commit revision"
        value: ${{ jobs.prepare.outputs.revision_sha }}

permissions:
  contents: write

env:
  NODE_VERSION: "26"
  PNPM_VERSION: "11.10.0"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.next_version.outputs.new_version }}
      new_tag: ${{ steps.next_version.outputs.new_tag }}
      revision_sha: ${{ steps.revision.outputs.sha }}
    steps:
      - name: Validate release source and edition
        env:
          RELEASE_REF: ${{ github.ref }}
          EDITION: ${{ inputs.edition }}
          SOURCE_BRANCH: ${{ inputs.source_branch }}
          TAG_PREFIX: ${{ inputs.tag_prefix }}
          ASSET_PREFIX: ${{ inputs.asset_prefix }}
          IMAGE_REPOSITORY: ${{ inputs.image_repository }}
        run: |
          set -euo pipefail
          if [ "${RELEASE_REF}" != "refs/heads/main" ]; then
            echo "Versioned releases must be dispatched from main; got ${RELEASE_REF}." >&2
            exit 1
          fi

          release_key="${EDITION}|${SOURCE_BRANCH}|${TAG_PREFIX}|${ASSET_PREFIX}|${IMAGE_REPOSITORY}"
          case "${release_key}" in
            "main|main|v|web2gem-main|web2gem"|\
            "account-pool|gemini-account-pool|pool-v|web2gem-account-pool|web2gem-account-pool")
              ;;
            *)
              echo "Unsupported release edition metadata: ${release_key}" >&2
              exit 1
              ;;
          esac

      - name: Checkout release branch
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_branch }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get current version
        id: get_version
        run: |
          set -euo pipefail
          LATEST_TAG="$(git tag --list "${TAG_PREFIX}[0-9]*" --sort=-v:refname | head -n 1)"
          TAG_VERSION="0.0.0"
          if [ -n "${LATEST_TAG}" ]; then
            TAG_VERSION="${LATEST_TAG:${#TAG_PREFIX}}"
          fi
          FILE_VERSION="$(node -p "require('./package.json').version")"

          VERSION="$(printf '%s\n' "${TAG_VERSION}" "${FILE_VERSION}" | sort -V | tail -n 1)"
          echo "Current ${EDITION:-release} version: ${VERSION}"
          echo "current_version=${VERSION}" >> "${GITHUB_OUTPUT}"
        env:
          TAG_PREFIX: ${{ inputs.tag_prefix }}
          EDITION: ${{ inputs.edition }}

      - name: Calculate next version
        id: next_version
        env:
          VERSION_TYPE: ${{ inputs.version_type }}
          TAG_PREFIX: ${{ inputs.tag_prefix }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.get_version.outputs.current_version }}"
          BASE_VERSION="$(echo "${VERSION}" | sed 's/-.*$//')"

          IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE_VERSION}"
          MAJOR="${MAJOR:-0}"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH:-0}"

          case "${VERSION_TYPE}" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
            *)
              echo "Unsupported version type: ${VERSION_TYPE}" >&2
              exit 1
              ;;
          esac

          echo "New version: ${NEW_VERSION}"
          echo "new_version=${NEW_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "new_tag=${TAG_PREFIX}${NEW_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Validate release tag is available
        run: |
          set -euo pipefail
          NEW_TAG="${{ steps.next_version.outputs.new_tag }}"
          if git rev-parse -q --verify "refs/tags/${NEW_TAG}" >/dev/null; then
            echo "Tag ${NEW_TAG} already exists." >&2
            exit 1
          fi

      - name: Update package and Worker versions
        run: |
          pnpm version ${{ steps.next_version.outputs.new_version }} --no-git-tag-version
          node -e 'const fs=require("node:fs");const version=require("./package.json").version;const path="src/config/index.ts";const source=fs.readFileSync(path,"utf8");const next=source.replace(/export const VERSION = "[^"]+";/, `export const VERSION = "${version}-worker";`);if(next===source)throw new Error("Worker VERSION was not updated");fs.writeFileSync(path,next);'

      - name: Release Blocking Gates
        run: |
          pnpm check:release
          pnpm docker:smoke

      - name: Commit package version and create tag
        env:
          EDITION: ${{ inputs.edition }}
          SOURCE_BRANCH: ${{ inputs.source_branch }}
          NEW_TAG: ${{ steps.next_version.outputs.new_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json pnpm-lock.yaml src/config/index.ts
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): bump ${EDITION} to ${NEW_TAG} [skip ci]"
          fi

          git tag -a "${NEW_TAG}" -m "Release ${EDITION} ${NEW_TAG}"
          git push --atomic origin "HEAD:${SOURCE_BRANCH}" "refs/tags/${NEW_TAG}"

      - name: Capture release revision
        id: revision
        run: echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"
