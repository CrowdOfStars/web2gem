name: Release Main Edition

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      publish_dockerhub:
        description: "Publish the release image to Docker Hub"
        required: true
        default: true
        type: boolean
      publish_aliyun:
        description: "Publish the release image to Aliyun Container Registry"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: versioned-release
  cancel-in-progress: false

jobs:
  prepare:
    uses: ./.github/workflows/reusable-versioned-release.yml
    with:
      edition: main
      source_branch: main
      tag_prefix: v
      asset_prefix: web2gem-main
      image_repository: web2gem
      version_type: ${{ inputs.version_type }}
    secrets: inherit

  publish:
    needs: prepare
    uses: ./.github/workflows/release-artifacts.yml
    with:
      edition: main
      tag_prefix: v
      asset_prefix: web2gem-main
      image_repository: web2gem
      release_tag: ${{ needs.prepare.outputs.new_tag }}
      revision_sha: ${{ needs.prepare.outputs.revision_sha }}
      prepared_revision: true
      publish_dockerhub: ${{ inputs.publish_dockerhub }}
      publish_aliyun: ${{ inputs.publish_aliyun }}
    secrets: inherit
